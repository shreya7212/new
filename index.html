<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pickwise</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#ffffff;color:#111;overflow-x:hidden}

    /* animated gradient background */
    body::before{
      content:"";
      position:fixed;
      width:100%;height:100%;
      background:linear-gradient(120deg,#6366f1,#8b5cf6,#22c55e);
      background-size:300% 300%;
      animation:gradientMove 12s ease infinite;
      z-index:-2;opacity:0.08;
    }

    @keyframes gradientMove{
      0%{background-position:0% 50%}
      50%{background-position:100% 50%}
      100%{background-position:0% 50%}
    }

    header{display:flex;justify-content:space-between;padding:20px 60px;position:fixed;width:100%;top:0;background:rgba(255,255,255,0.6);backdrop-filter:blur(12px);z-index:100}

    .hero{padding:200px 20px 140px;text-align:center}
    .hero h1{font-size:72px;letter-spacing:-2px}
    .hero p{color:#555;margin-top:10px}

    .btn{padding:14px 22px;border-radius:14px;border:none;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;cursor:pointer;transition:.3s}
    .btn:hover{transform:scale(1.08)}

    .section{padding:140px 60px;opacity:0;transform:translateY(80px);transition:1s}
    .section.show{opacity:1;transform:translateY(0)}

    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:30px}

    .card{
      background:white;
      padding:25px;
      border-radius:20px;
      box-shadow:0 20px 50px rgba(0,0,0,0.08);
      transform-style:preserve-3d;
      transition:.4s;
      opacity:0;
      transform:translateY(40px);
    }

    .card.show{
      opacity:1;
      transform:translateY(0);
    }

    /* stagger animation */
    .card:nth-child(1){transition-delay:0.1s}
    .card:nth-child(2){transition-delay:0.2s}
    .card:nth-child(3){transition-delay:0.3s}

    .card:hover{transform:scale(1.05) rotateX(6deg) rotateY(-6deg)}

    /* parallax floating shapes */
    .blob{
      position:absolute;
      width:300px;height:300px;
      background:radial-gradient(circle,#6366f1,transparent);
      filter:blur(100px);
      z-index:-1;
    }

    .blob1{top:100px;left:10%}
    .blob2{top:400px;right:10%}

    footer{text-align:center;padding:40px;color:#666}

  </style>
</head>
<body>

<header>
  <div><b>Pickwise</b></div>
</header>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<section class="hero">
  <h1>Pick Smart. Shop Smarter.</h1>
  <p>Compare prices. Track trends. Save money.</p>
  <button class="btn">Explore Trends</button>
</section>

<section class="section">
  <h2>🔥 Trending Comparisons</h2>
  <div class="grid">
    <div class="card"><h3>Nike Air Max</h3><p>Amazon ₹5999 vs Flipkart ₹5499</p></div>
    <div class="card"><h3>iPhone 14</h3><p>Amazon ₹69999 vs Flipkart ₹67499</p></div>
    <div class="card"><h3>Boat Airdopes</h3><p>Amazon ₹1999 vs Flipkart ₹1799</p></div>
  </div>
</section>

<footer>© 2026 Pickwise</footer>

<script>

// scroll reveal
const sections=document.querySelectorAll('.section');
const cards=document.querySelectorAll('.card');

const observer=new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add('show');
      entry.target.querySelectorAll('.card').forEach(c=>c.classList.add('show'));
    }
  });
},{threshold:0.2});

sections.forEach(sec=>observer.observe(sec));

// mouse parallax effect
window.addEventListener('mousemove',e=>{
  const x=(e.clientX/window.innerWidth-0.5)*20;
  const y=(e.clientY/window.innerHeight-0.5)*20;

  document.querySelectorAll('.blob').forEach(blob=>{
    blob.style.transform=`translate(${x}px, ${y}px)`;
  });
});

</script>

</body>
</html>
